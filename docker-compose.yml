services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      REDIS_URL: redis://${REDIS_HOST}:${REDIS_PORT}
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      VITE_API_BASE_URL: http://api:3000/api
    ports:
      - "3001:3001"
    depends_on:
      - api
