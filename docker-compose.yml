services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      REDIS_URL: redis://${REDIS_HOST}:${REDIS_PORT}
    expose:
      - "3000"
    volumes:
      - sysvol:/app/sysvol
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      VITE_API_BASE_URL: /api
    expose:
      - "3001"
    depends_on:
      - api

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "9105:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"

volumes:
  sysvol:
    driver: local
    driver_opts:
      type: cifs
      o: username=${DOMAIN_USERNAME},password=${DOMAIN_PASSWORD},domain=${DOMAIN_NAME},vers=${CIFS_VERS},uid=1000,gid=1000,file_mode=0664,dir_mode=0775
      device: ${CIFS_SHARE_PATH}
